# Prometheus Configuration for Prompt Builder API
#
# This configuration scrapes metrics from the application
# and provides data for Grafana dashboards
#
# To run:
# docker run -p 9090:9090 -v $(pwd)/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus

global:
  scrape_interval: 15s # Scrape targets every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds
  external_labels:
    cluster: "prompt-builder"
    environment: "development"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Note: the API no longer exposes a Prometheus /metrics endpoint.
  # Production observability is now emitted to PostHog via
  # SuggestionsTelemetryService and LlmCallTelemetryService.

  # Node exporter (system metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
