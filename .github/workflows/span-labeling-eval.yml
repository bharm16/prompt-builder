name: Span Labeling Golden-Set Eval

# Runs Relaxed F1 evaluation against the hand-labeled golden-set fixtures
# and gates on per-category regression vs. the blessed baseline.
#
# This is separate from the LLM-as-judge eval (`span-labeling-evaluation.ts`)
# because the metrics, cadences, and failure modes are different.
#
# Setup before this workflow can pass:
#   1. Run `npm run eval:golden-set:bless` locally with each provider's API key
#   2. Commit the resulting `scripts/evaluation/golden-set-baselines/{provider}.json`
#   3. Add `GROQ_API_KEY` and (optionally) `OPENAI_API_KEY` repo secrets

on:
  # Nightly Groq run — cheap provider, daily signal
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
    - cron: "0 7 * * 0" # 07:00 UTC Sundays — full multi-provider sweep
  # Manual trigger for ad-hoc runs and post-bless verification
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to evaluate"
        required: true
        default: "groq"
        type: choice
        options:
          - groq
          - openai
      fixtures:
        description: "Comma-separated fixture filter (empty = all)"
        required: false
        default: ""
      bless:
        description: "Write a fresh baseline instead of gating"
        required: false
        default: false
        type: boolean

jobs:
  groq-eval:
    # Daily nightly + manual when provider=groq
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.provider == 'groq')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run golden-set evaluation (Groq)
        # Don't fail the entire workflow on regression — we want artifact
        # upload to run even when the gate trips. The dedicated step below
        # converts the captured exit code into a job-level failure.
        id: eval
        continue-on-error: true
        env:
          # Capture all user-controllable inputs into env vars to avoid GitHub
          # Actions template-substitution injection in `run:` blocks.
          BLESS_FLAG: ${{ github.event.inputs.bless }}
          COMMIT_SHA: ${{ github.sha }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          NODE_ENV: test
        run: |
          if [ "$BLESS_FLAG" = "true" ]; then
            npm run eval:golden-set:bless -- --provider groq --commit "$COMMIT_SHA"
          else
            npm run eval:golden-set -- --provider groq --commit "$COMMIT_SHA"
          fi

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-set-results-groq-${{ github.run_id }}
          path: scripts/evaluation/golden-set-results-latest.json
          retention-days: 30

      - name: Fail job on regression
        # Only the actual gate run should fail the job. Bless runs that
        # succeeded (exit 0) or setup errors (exit 2) shouldn't.
        if: steps.eval.outcome == 'failure' && github.event.inputs.bless != 'true'
        run: |
          echo "::error::Golden-set evaluation flagged regressions for Groq. See artifact for details."
          exit 1

  weekly-multi-provider:
    # Sunday cron only — run all providers we have keys for
    if: |
      github.event_name == 'schedule' &&
      github.event.schedule == '0 7 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        provider: [openai]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run golden-set evaluation (${{ matrix.provider }})
        id: eval
        continue-on-error: true
        env:
          # matrix.provider is constrained by the strategy block above, but
          # using env: here keeps the safe pattern consistent.
          PROVIDER: ${{ matrix.provider }}
          COMMIT_SHA: ${{ github.sha }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          NODE_ENV: test
        run: npm run eval:golden-set -- --provider "$PROVIDER" --commit "$COMMIT_SHA"

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-set-results-${{ matrix.provider }}-${{ github.run_id }}
          path: scripts/evaluation/golden-set-results-latest.json
          retention-days: 30

      - name: Fail job on regression
        if: steps.eval.outcome == 'failure'
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          echo "::error::Golden-set evaluation flagged regressions for $PROVIDER. See artifact."
          exit 1

  workflow-dispatch-openai:
    # Manual run when provider=openai
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.provider == 'openai'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run golden-set evaluation (OpenAI)
        id: eval
        continue-on-error: true
        env:
          # All inputs captured into env vars to prevent shell injection.
          BLESS_FLAG: ${{ github.event.inputs.bless }}
          FIXTURES: ${{ github.event.inputs.fixtures }}
          COMMIT_SHA: ${{ github.sha }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          NODE_ENV: test
        run: |
          # Validate FIXTURES content — only allow comma-separated alphanumerics
          # plus dash/underscore. Defense-in-depth against env-var content.
          if [ -n "$FIXTURES" ] && ! echo "$FIXTURES" | grep -Eq '^[a-zA-Z0-9_,-]+$'; then
            echo "::error::Invalid --fixtures value. Allowed: [A-Za-z0-9_,-]"
            exit 2
          fi

          ARGS=(--provider openai --commit "$COMMIT_SHA")
          if [ -n "$FIXTURES" ]; then
            ARGS+=(--fixtures "$FIXTURES")
          fi

          if [ "$BLESS_FLAG" = "true" ]; then
            npm run eval:golden-set:bless -- "${ARGS[@]}"
          else
            npm run eval:golden-set -- "${ARGS[@]}"
          fi

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-set-results-openai-${{ github.run_id }}
          path: scripts/evaluation/golden-set-results-latest.json
          retention-days: 30

      - name: Fail job on regression
        if: steps.eval.outcome == 'failure' && github.event.inputs.bless != 'true'
        run: |
          echo "::error::Golden-set evaluation flagged regressions for OpenAI. See artifact."
          exit 1
