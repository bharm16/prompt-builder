# .github/workflows/synthetic-harness.yml
#
# Synthetic traffic harness — emits operational telemetry events DIRECTLY
# (no HTTP) using the same PostHogClient + telemetry services the server
# uses, wrapped in an ALS frame with source="synthetic". Source-stamping
# is handled by the PostHogClient wrapper.
#
# DISABLED CRON: Vidra has no deployed production environment as of
# 2026-05-10. The harness can run as a scheduled job today (it doesn't
# need a server), but we keep cron commented out until we want pre-launch
# baseline data flowing daily. Uncomment to enable.

name: Synthetic Traffic Harness

on:
  workflow_dispatch:
    inputs:
      surfaces:
        description: "Comma-separated surfaces (default: all three)"
        required: false
        type: string
        default: "optimize,suggestions,span-labels"
  # schedule:
  #   - cron: "0 8 * * *"  # 08:00 UTC daily — uncomment when ready for nightly baselines

jobs:
  run-harness:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run harness
        env:
          HARNESS_SURFACES: ${{ inputs.surfaces || 'optimize,suggestions,span-labels' }}
        run: npm run synthetic -- --only "$HARNESS_SURFACES"
