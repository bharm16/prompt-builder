name: E2E Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The Microsoft Playwright image bundles Chromium/Firefox/WebKit and
    # all their apt dependencies, so the previous `npx playwright install
    # --with-deps` step (~3m45s of apt-get + binary download) goes away.
    # Pin the tag to the @playwright/test version in package.json to keep
    # them in lockstep on upgrades.
    container: mcr.microsoft.com/playwright:v1.56.0-noble

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY || 'sk-test-key' }}
          VITE_FIREBASE_API_KEY: test-key
          VITE_FIREBASE_PROJECT_ID: test-project
          VITE_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          VITE_FIREBASE_STORAGE_BUCKET: test.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          VITE_FIREBASE_APP_ID: test-app-id
          PORT: 3001
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          CI: true
          # Server-side env (no VITE_ prefix). The server checks for either
          # GCS_BUCKET_NAME or FIREBASE_STORAGE_BUCKET on startup; values
          # match config/test/vitest.setup.server.js.
          GCS_BUCKET_NAME: prompt-builder-test-bucket
          FIREBASE_STORAGE_BUCKET: test.appspot.com
          VIDEO_GENERATE_IDEMPOTENCY_MODE: soft
          # Chromium-only on PRs (fast feedback). Push to main / develop
          # and the nightly schedule run all browsers for regression
          # coverage. The flag is consumed by config/test/playwright.config.js.
          E2E_ALL_BROWSERS: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 7

  accessibility-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        # SPA crashes on init without these VITE_* values. Without a
        # rendered DOM both Pa11y (browser launch fine but nothing to scan)
        # and Lighthouse (NO_FCP) fail. Test placeholders are fine —
        # nothing in this job makes real Firebase calls.
        env:
          VITE_ANTHROPIC_API_KEY: "sk-test-key"
          VITE_FIREBASE_API_KEY: "test-key"
          VITE_FIREBASE_PROJECT_ID: "test-project"
          VITE_FIREBASE_AUTH_DOMAIN: "test.firebaseapp.com"
          VITE_FIREBASE_STORAGE_BUCKET: "test.appspot.com"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          VITE_FIREBASE_APP_ID: "test-app-id"
        run: npm run build

      - name: Run Pa11y accessibility tests
        run: |
          # --gzip enables Content-Encoding: gzip on responses, satisfying the
          # Lighthouse uses-text-compression audit run later in this job.
          npx http-server dist -p 8080 --gzip &
          SERVER_PID=$!
          # Wait for server to actually accept connections
          for i in {1..15}; do
            if curl -fs http://localhost:8080/ >/dev/null 2>&1; then break; fi
            sleep 1
          done

          # The site has no /sitemap.xml; run pa11y on the root URL with
          # Chrome flags that work on Ubuntu 24+ runners (sandboxing is
          # disabled by AppArmor on hosted runners).
          npx pa11y \
            --config .pa11yci.json \
            http://localhost:8080

          kill $SERVER_PID

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:8080
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ".lighthouserc.json"
