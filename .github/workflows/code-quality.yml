name: Code Quality Checks

on: [pull_request]

jobs:
  check-file-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check for large files
        run: |
          find src client/src -type f \( -name "*.js" -o -name "*.jsx" \) -exec wc -l {} + | \
          awk '$1 > 500 {print "Large file: " $2 " (" $1 " lines)"; exit 1}'

          echo "All files under 500 lines"

  check-generated-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify route map is up to date
        run: npm run routemap:check

      - name: Verify feature-flag table is up to date
        run: npm run flagdocs:check
