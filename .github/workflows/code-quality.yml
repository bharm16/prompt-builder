name: Code Quality Checks

on: [pull_request]

jobs:
  check-file-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check for large files
        run: |
          # Fail if any .js/.jsx file exceeds 500 lines
          find src client/src -type f \( -name "*.js" -o -name "*.jsx" \) -exec wc -l {} + | \
          awk '$1 > 500 {print "❌ Large file: " $2 " (" $1 " lines)"; exit 1}'

          echo "✅ All files under 500 lines"

  check-route-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Verify ROUTE_MAP.md is up to date
        run: npm run routemap:check
