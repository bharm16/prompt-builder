# Prometheus configuration for Prompt Builder monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "prompt-builder"

scrape_configs:
  # Note: the API no longer exposes a Prometheus /metrics endpoint.
  # Production observability is now emitted to PostHog via
  # SuggestionsTelemetryService and LlmCallTelemetryService.

  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
